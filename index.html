<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Cuánto conoces a Daniel Morales?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --red: #D32F2F;
  --red-light: #FF6659;
  --red-dark: #9A0007;
  --black: #121212;
  --black-pure: #000000;
  --white: #FFFFFF;
  --cream: #FFF5F5;
  --glass: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.2);
  --glass-dark: rgba(0, 0, 0, 0.4);
  --glass-dark-border: rgba(255, 255, 255, 0.1);
  --muted: rgba(255, 255, 255, 0.6);
  --success: #4CAF50;
  --error: #F44336;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black-pure);
  font-family: 'Inter', sans-serif;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px);
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(211, 47, 47, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.1) 0%, transparent 40%),
    #0d0d0d;
  pointer-events: none;
  z-index: -1;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: -1;
}

/* WELCOME */
#welcome {
  gap: 32px;
}

.logo-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 1px;
  color: var(--white);
  box-shadow: 0 0 30px rgba(211, 47, 47, 0.4);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.welcome-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 10vw, 84px);
  line-height: 0.9;
  text-align: center;
  letter-spacing: 2px;
  color: var(--white);
  text-transform: uppercase;
}

.welcome-title span {
  color: var(--red);
  display: block;
}

.welcome-sub {
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
  font-weight: 600;
}

.name-box {
  width: 100%;
  max-width: 400px;
  background: var(--glass-dark);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-dark-border);
  border-radius: 16px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s ease;
}

.name-box:focus-within {
  border-color: var(--red);
  box-shadow: 0 0 20px rgba(211, 47, 47, 0.2);
  transform: translateY(-2px);
}

.name-box span {
  font-size: 20px;
  opacity: 0.8;
}

.name-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 500;
}

.name-box input::placeholder {
  color: rgba(255, 255, 255, 0.3);
}

.btn-start {
  background: var(--red);
  color: var(--white);
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 4px;
  padding: 18px 60px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 20px rgba(211, 47, 47, 0.3);
}

.btn-start:hover {
  background: var(--red-light);
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 15px 30px rgba(211, 47, 47, 0.4);
}

.btn-start:active {
  transform: translateY(0) scale(0.98);
}

.rules {
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 1px;
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
}

/* QUIZ */
#quiz {
  justify-content: flex-start;
  overflow-y: auto;
  padding: 0;
}

.quiz-inner {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.progress-wrap {
  width: 100%;
  margin-bottom: 40px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 12px;
}

.progress-label {
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 700;
}

.progress-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: var(--red-light);
  letter-spacing: 1px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--glass-dark);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--glass-dark-border);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red-dark), var(--red));
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 10px rgba(211, 47, 47, 0.5);
}

.slide {
  animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide-exit {
  animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
}

@keyframes slideDown {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-20px); }
}

.q-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.q-badge {
  background: var(--red);
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  padding: 6px 16px;
  border-radius: 6px;
}

.q-counter {
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
}

.q-text {
  font-size: clamp(22px, 5vw, 28px);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 32px;
  color: var(--white);
}

.options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.opt {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  background: var(--glass-dark);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-dark-border);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 17px;
  font-weight: 600;
  color: var(--white);
  position: relative;
}

.opt:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.3);
  transform: translateX(8px);
}

.opt-letter {
  width: 36px;
  height: 36px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.2s;
}

.opt.correct {
  border-color: var(--success);
  background: rgba(76, 175, 80, 0.15);
  box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
}

.opt.correct .opt-letter {
  background: var(--success);
  border-color: var(--success);
  color: var(--white);
}

.opt.wrong {
  border-color: var(--error);
  background: rgba(244, 67, 54, 0.15);
}

.opt.wrong .opt-letter {
  background: var(--error);
  border-color: var(--error);
  color: var(--white);
}

.opt.dim {
  opacity: 0.4;
  filter: grayscale(0.5);
  cursor: default;
}

.opt.dim:hover {
  transform: none;
}

.feedback {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-radius: 12px;
  margin-top: 24px;
  font-weight: 700;
  font-size: 16px;
  animation: fadeIn 0.3s ease both;
}

.feedback.show {
  display: flex;
}

.feedback.ok {
  background: rgba(76, 175, 80, 0.1);
  border: 1px solid rgba(76, 175, 80, 0.3);
  color: #81C784;
}

.feedback.fail {
  background: rgba(244, 67, 54, 0.1);
  border: 1px solid rgba(244, 67, 54, 0.3);
  color: #E57373;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.open-area {
  width: 100%;
  background: var(--glass-dark);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-dark-border);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  font-weight: 500;
  padding: 20px;
  border-radius: 16px;
  outline: none;
  resize: none;
  transition: all 0.3s ease;
  min-height: 120px;
}

.open-area:focus {
  border-color: var(--red);
  box-shadow: 0 0 20px rgba(211, 47, 47, 0.15);
}

.btn-next {
  margin-top: 32px;
  background: var(--white);
  color: var(--black-pure);
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  padding: 18px;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: none;
  font-weight: 900;
}

.btn-next.show {
  display: block;
}

.btn-next:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
}

.btn-next:active {
  transform: translateY(0);
}

/* RESULTS */
#results {
  justify-content: flex-start;
  overflow-y: auto;
  padding: 0;
}

.results-inner {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding: 40px 24px 100px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.score-hero {
  background: var(--glass-dark);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-dark-border);
  border-radius: 32px;
  padding: 48px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.score-hero::before {
  content: 'DM';
  position: absolute;
  right: -20px;
  bottom: -40px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 180px;
  color: rgba(211, 47, 47, 0.05);
  line-height: 1;
  pointer-events: none;
  font-weight: 900;
}

.score-tag {
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 700;
}

.score-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 20vw, 130px);
  line-height: 0.8;
  color: var(--white);
  margin-bottom: 8px;
  background: linear-gradient(180deg, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.score-of {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: var(--muted);
  letter-spacing: 1px;
}

.score-msg {
  font-size: 18px;
  font-weight: 700;
  margin-top: 24px;
  color: var(--white);
  line-height: 1.4;
}

.score-pct-bar {
  width: 100%;
  height: 8px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  margin-top: 32px;
  overflow: hidden;
}

.score-pct-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red-dark), var(--red));
  border-radius: 10px;
  transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.score-name {
  font-size: 14px;
  color: var(--muted);
  margin-top: 16px;
  font-weight: 600;
  letter-spacing: 1px;
}

.open-result-box {
  background: var(--glass-dark);
  border: 1px solid var(--glass-dark-border);
  border-radius: 20px;
  padding: 24px;
}

.open-result-label {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--red-light);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 800;
}

.open-result-text {
  font-size: 18px;
  font-weight: 600;
  font-style: italic;
  color: var(--white);
  line-height: 1.5;
}

.detail-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--white);
  margin-bottom: -16px;
}

.detail-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.detail-item {
  background: var(--glass-dark);
  border-radius: 16px;
  padding: 18px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  border: 1px solid var(--glass-dark-border);
  transition: transform 0.2s ease;
}

.detail-item:hover {
  transform: scale(1.01);
  background: rgba(255, 255, 255, 0.03);
}

.detail-dot {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  flex-shrink: 0;
}

.detail-dot.ok { background: var(--success); color: var(--white); }
.detail-dot.fail { background: var(--error); color: var(--white); }
.detail-dot.open-q { background: var(--muted); color: var(--black-pure); }

.detail-q {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 500;
}

.detail-a {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.detail-correct {
  font-size: 13px;
  color: var(--success);
  margin-top: 6px;
  font-weight: 600;
}

.send-status {
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  padding: 12px;
  font-weight: 500;
}

.btn-restart {
  background: transparent;
  color: var(--white);
  border: 2px solid var(--glass-border);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 4px;
  padding: 16px;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
  transition: all 0.3s ease;
}

.btn-restart:hover {
  background: var(--white);
  color: var(--black-pure);
  border-color: var(--white);
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--red);
  color: var(--white);
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 15px;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background-color: var(--red);
  position: absolute;
  top: -10px;
  z-index: 1000;
  border-radius: 2px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="screen" id="welcome">

</div>

<div class="screen hidden" id="quiz">

<div class="screen hidden" id="results">

</div>

<div class="toast" id="toast"></div>

  {id:24,text:"¿En qué parte de Italia vive Daniel?",correct:"Florencia",opts:["Florencia","Roma","Milán","Venecia"]},
  {id:25,text:"¿Cuál fue la última persona con la que estuvo Daniel?",correct:"Laura",opts:["Laura","Paula","Valentina","Mariana"]},
  {id:26,text:"¿Qué plan preferiría Daniel?",correct:"Sexo, alcohol y drogas",opts:["Sexo, alcohol y drogas","Cine y pizza en casa","Viaje en familia","Tarde de videojuegos"]},
  {id:27,text:"¿Cuál es el talento oculto de Daniel?",correct:"Mentirle a todas",opts:["Mentirle a todas","Cantar muy bien","Tocar guitarra","Hacer magia"]},
  {id:28,text:"¿Cuáles son los peores hombres del mundo según el contexto de Daniel?",correct:"Daniel, Bustamante, León",opts:["Daniel, Bustamante, León","Montoya, León, Danie","Ramos, Bus, Daniel","Gabriela, Laura, Daniel"]},
  {id:29,text:"¿Cómo describirías a Daniel Morales en una sola palabra?",open:true}
];

const LETTERS=['A','B','C','D'];
let currentQ=0,score=0,answered=false,playerName='',results=[],shuffledOpts=[];

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function createConfetti() {
  const colors = ['#D32F2F', '#FF6659', '#FFFFFF', '#4CAF50'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 2 + 's';
    c.style.opacity = Math.random();
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function startQuiz(){
  playerName=document.getElementById('playerName').value.trim();
  if(!playerName){showToast('⚠️ Escribe tu nombre primero');return;}
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function renderQuestion(){
  answered=false;
  const q=questions[currentQ];
  const area=document.getElementById('slideArea');
  const old=area.querySelector('.slide');
  if(old){old.classList.remove('slide');old.classList.add('slide-exit');setTimeout(()=>old.remove(),300);}
  const pct=Math.round((currentQ/questions.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('liveScore').textContent=score+' pts';
  setTimeout(()=>{
    const div=document.createElement('div');
    div.className='slide';
    if(q.open){
      div.innerHTML=`
        <div class="q-meta"><div class="q-badge">PREGUNTA ${currentQ+1}</div><span class="q-counter">de ${questions.length}</span></div>
        <div class="q-text">${q.text}</div>
        <textarea class="open-area" id="openAns" placeholder="Escribe aquí tu respuesta..." rows="3"></textarea>
        <button class="btn-next show" style="margin-top:16px" onclick="submitOpen()">FINALIZAR →</button>`;
    } else {
      shuffledOpts=shuffle(q.opts);
      const optsHTML=shuffledOpts.map((opt,i)=>`
        <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
          <div class="opt-letter">${LETTERS[i]}</div>
          <span>${opt}</span>
        </div>`).join('');
      div.innerHTML=`
        <div class="q-meta"><div class="q-badge">PREGUNTA ${currentQ+1}</div><span class="q-counter">de ${questions.length}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optsHTML}</div>
        <div class="feedback" id="feedback"><span class="feedback-icon" id="fbIcon"></span><span id="fbText"></span></div>
        <button class="btn-next" id="btnNext" onclick="nextQuestion()">${currentQ<questions.length-1?'SIGUIENTE →':'VER RESULTADOS →'}</button>`;
    }
    area.appendChild(div);
  },old?310:0);
}

function selectOpt(idx){
  if(answered)return;
  answered=true;
  const q=questions[currentQ];
  const chosen=shuffledOpts[idx];
  const isCorrect=chosen===q.correct;
  if(isCorrect) {
    score+=3;
    createConfetti();
  }
  results.push({q:q.text,userAns:chosen,correct:q.correct,isCorrect,isOpen:false});
  shuffledOpts.forEach((opt,i)=>{
    const el=document.getElementById('opt-'+i);
    if(opt===q.correct){el.classList.add('correct');}
    else if(i===idx&&!isCorrect){el.classList.add('wrong');}
    else{el.classList.add('dim');}
    el.style.pointerEvents='none';
  });
  const fb=document.getElementById('feedback');
  document.getElementById('fbIcon').textContent=isCorrect?'✓':'✗';
  document.getElementById('fbText').textContent=isCorrect?'¡Correcto! +3 puntos':'Incorrecto. La respuesta era: '+q.correct;
  fb.classList.add('show',isCorrect?'ok':'fail');
  document.getElementById('btnNext').classList.add('show');
}

function submitOpen(){
  const ans=(document.getElementById('openAns')||{}).value||'';
  results.push({q:questions[currentQ].text,userAns:ans.trim()||'(sin respuesta)',isOpen:true});
  nextQuestion();
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=questions.length){showResults();}else{renderQuestion();}
}

function showResults(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  const maxScore=(questions.length-1)*3;
  const pct=Math.round((score/maxScore)*100);
  let msg='';
  if(pct>=90)msg='🔥 Eres el/la fan #1 de Daniel. Brutal.';
  else if(pct>=70)msg='😎 Lo conoces muy bien. ¡Crack!';
  else if(pct>=50)msg='🤔 Algo sabes... pero le falta.';
  else if(pct>=30)msg='😅 ¿Seguro que lo conoces?';
  else msg='💀 Definitivamente no lo conoces para nada.';
  const openR=results.find(r=>r.isOpen);
  const detailHTML=results.map((r,i)=>{
    if(r.isOpen)return`<div class="detail-item open-q"><div class="detail-dot open-q">?</div><div><div class="detail-q">P${i+1}. ${r.q}</div><div class="detail-a" style="color:#aaa;font-style:italic">"${r.userAns}"</div></div></div>`;
    return`<div class="detail-item ${r.isCorrect?'ok':'fail'}"><div class="detail-dot ${r.isCorrect?'ok':'fail'}">${r.isCorrect?'✓':'✗'}</div><div><div class="detail-q">P${i+1}. ${r.q}</div><div class="detail-a">${r.userAns}</div>${!r.isCorrect?`<div class="detail-correct">✓ ${r.correct}</div>`:''}</div></div>`;
  }).join('');
  document.getElementById('resultsInner').innerHTML=`
    <div class="score-hero">
      <div class="score-tag">Tu puntaje, ${playerName}</div>
      <div class="score-big">${score}</div>
      <div class="score-of">de ${maxScore} puntos</div>
      <div class="score-msg">${msg}</div>
      <div class="score-pct-bar"><div class="score-pct-fill" id="pctFill" style="width:0%"></div></div>
      <div class="score-name">${pct}% de aciertos</div>
    </div>
    ${openR?`<div class="open-result-box"><div class="open-result-label">Tu descripción de Daniel</div><div class="open-result-text">"${openR.userAns}"</div></div>`:''}
    <div class="detail-title">Detalle de respuestas</div>
    <div class="detail-list">${detailHTML}</div>
    <div class="send-status" id="sendStatus">📤 Enviando resultados...</div>
    <button class="btn-restart" onclick="restartQuiz()">VOLVER A INTENTAR</button>`;
  setTimeout(()=>{const f=document.getElementById('pctFill');if(f)f.style.width=pct+'%';},400);
  sendToSheets(pct,maxScore,openR);
}

async function sendToSheets(pct,maxScore,openR){
  const payload={nombre:playerName,puntaje:score,maximo:maxScore,porcentaje:pct,fecha:new Date().toLocaleString('es-CO'),descripcion:openR?openR.userAns:'',respuestas:results.map((r,i)=>({pregunta:'P'+(i+1),respuesta:r.userAns,correcto:r.isOpen?'abierta':r.isCorrect?'sí':'no'}))};
  try{
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const s=document.getElementById('sendStatus');if(s){s.textContent='✅ Resultados enviados a Google Sheets.';s.style.color='#22c55e';}
  }catch(e){
    const s=document.getElementById('sendStatus');if(s){s.textContent='⚠️ No se pudo conectar con Google Sheets. Verifica la URL.';s.style.color='#ff5555';}
  }
}

function restartQuiz(){
  currentQ=0;score=0;answered=false;results=[];
  document.getElementById('results').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('playerName').value='';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('liveScore').textContent='0 pts';
  document.getElementById('slideArea').innerHTML='';
}
</script>
